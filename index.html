<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Neo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">

<style>
body{
font-family:'Noto Sans Thai',sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
padding:30px 20px;
}

.main-title{
font-size:32px;
font-weight:bold;
}

.sub-title{
font-size:16px;
color:#555;
}

.ar-section{
margin:40px auto;
max-width:900px;
padding:20px;
}

.head-title{
font-size:24px;
font-weight:bold;
}

.ar-button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#000;
color:#fff;
cursor:pointer;
}

footer{
margin-top:50px;
padding:30px;
background:#eee;
}

.footer-link{
margin:5px 0;
}
</style>

</head>
<body>

<header>
<div class="main-title">Thagoon Thaphrik</div>
<div class="sub-title">Knight (AR)</div>
</header>

<!-- Knight -->

<div class="ar-section">

<div class="head-title">Knight</div>
<div class="sub-title">Concept design from individual project (Game)</div>

<model-viewer
id="model1"
src="AR.glb"
ios-src="AR.usdz"
ar
ar-placement="floor"
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
animation-name="*"
autoplay
shadow-intensity="1"
environment-image="neutral"
style="width:100%; height:400px;"> </model-viewer>

<button class="ar-button" onclick="triggerAR('model1')">
Play AR
</button>

</div>

<!-- P'tae -->

<div class="ar-section">

<div class="head-title">P'tae</div>
<div class="sub-title">The design concept was from real politician man</div>

<model-viewer
id="model2"
src="AR2.glb"
ios-src="AR2.usdz"
ar
ar-placement="floor"
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
animation-name="*"
autoplay
shadow-intensity="1"
environment-image="neutral"
style="width:100%; height:400px;"> </model-viewer>

<button class="ar-button" onclick="triggerAR('model2')">
Play AR
</button>

</div>

<footer>

<div class="footer-link">
<strong>Facebook:</strong>
<a href="https://www.facebook.com/neo.thagoon" target="_blank">
facebook.com/neo.thagoon
</a>
</div>

</footer>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<script>

function triggerAR(id){

const viewer = document.getElementById(id);

if(viewer && viewer.activateAR){

viewer.activateAR().catch((error)=>{

alert("AR ไม่พร้อมบนอุปกรณ์นี้ หรือ browser ไม่รองรับ");

console.warn(error);

});

}

}

</script>

</body>
</html>
